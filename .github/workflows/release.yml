# This is a basic workflow to help you get started with Actions

name: sls-doc-release

# Controls when the action will run.
on:
  release:
    types: [published]
  push:
    branches:
      - main

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  run_if:
    if: >-
      ${{
        github.event_name == 'release' ||
        (
          github.event_name == 'push' &&
          github.ref == 'refs/heads/main' &&
          (
            github.actor == 'wangtao0101' ||
            github.event.head_commit.author.username == 'wangtao0101' ||
            github.event.head_commit.author.name == '灵亦'
          ) &&
          (
            contains(github.event.head_commit.message, '@build') ||
            contains(toJSON(github.event.commits.*.message), '@build')
          )
        )
      }}
    strategy:
      matrix:
        platform: [ubuntu-latest]
        node: ['18']
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 18

      - run: npm install pnpm -g --registry https://registry.npmjs.org/

      - run: pnpm install --registry https://registry.npmjs.org/

      - run: pnpm build

      - name: upload files to OSS
        uses: fangbinwei/aliyun-oss-website-action@v1
        with:
          accessKeyId: ${{ secrets.OSS_ACCESS_KEY_ID }}
          accessKeySecret: ${{ secrets.OSS_ACCESS_KEY_SECRET }}
          bucket: sls-docs
          endpoint: oss-cn-hangzhou.aliyuncs.com
          folder: .vitepress/dist
          skipSetting: true
